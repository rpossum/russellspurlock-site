<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Russell Spurlock — QR Contact Card</title>
  <meta name="description" content="Scan to save Russell Spurlock's contact info." />
  <meta name="robots" content="noindex" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary-color: #004080;
      --accent-color: #ff8000;
      --text-color: #1f1f1f;
      --bg-light: #f9f9f9;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text-color);
      background: var(--bg-light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1, h2, h3 {
      font-family: 'Poppins', sans-serif;
    }

    a { text-decoration: none; }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }

    .qr-wrap {
      max-width: 520px;
      width: 100%;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 40px 32px;
      text-align: center;
    }

    .qr-kicker {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent-color);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 8px;
    }

    .qr-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--primary-color);
      margin: 0 0 6px;
    }

    .qr-subtitle {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 24px;
    }

    .qr-image {
      display: block;
      width: 100%;
      max-width: 380px;
      height: auto;
      margin: 0 auto 16px;
      border-radius: 8px;
    }

    .qr-url {
      font-size: 0.85rem;
      color: #777;
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      margin-bottom: 24px;
      word-break: break-all;
    }

    .qr-url a { color: var(--primary-color); }

    .tap-btn {
      display: block;
      width: 100%;
      background: var(--primary-color);
      color: #fff;
      border: none;
      padding: 14px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 10px;
      transition: background 0.2s;
    }

    .tap-btn:hover, .tap-btn:focus {
      background: #003060;
      color: #fff;
    }

    .tap-btn i { margin-right: 6px; }

    .download-link {
      display: inline-block;
      font-size: 0.85rem;
      color: var(--primary-color);
      font-weight: 600;
      margin-top: 8px;
    }

    .download-link:hover, .download-link:focus {
      text-decoration: underline;
    }

    .site-link {
      text-align: center;
      margin-top: 24px;
      font-size: 0.85rem;
      color: #777;
    }

    .site-link a { color: var(--primary-color); font-weight: 600; }

    footer {
      text-align: center;
      font-size: 0.8rem;
      color: #888;
      padding: 16px;
    }
  </style>
</head>
<body>

<main>
  <div class="qr-wrap">
    <div class="qr-kicker">Russell Spurlock, CFII</div>
    <h1 class="qr-title">Scan to Save My Contact</h1>
    <p class="qr-subtitle">Point your camera at the code &mdash; your phone will offer to add me to Contacts.</p>

    <img src="/images-new/card-qr.png" alt="QR code linking to russellspurlock.com/card" class="qr-image" />

    <div class="qr-url"><a href="/card">russellspurlock.com/card</a></div>

    <a href="/card" class="tap-btn">
      <i class="bi bi-person-plus-fill"></i>Or tap here to save directly
    </a>

    <a href="/images-new/card-qr.png" download="russell-spurlock-qr.png" class="download-link">
      <i class="bi bi-download"></i> Download QR image
    </a>

    <p class="site-link"><a href="/">russellspurlock.com</a></p>
  </div>
</main>

<footer>&copy; <span id="yr"></span> Russell Spurlock</footer>

<script>
  document.getElementById('yr').textContent = new Date().getFullYear();
</script>

<!-- Vercel Web Analytics -->
<script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
